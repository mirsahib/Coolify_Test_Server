name: Deploy to Coolify over Tailscale

on:
  push:
    branches:
      - master 

# IMPORTANT: You MUST add these permissions for OIDC to work
permissions:
  id-token: write 
  contents: read 

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Connect to Tailscale using Workload Identity Federation (OIDC)
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          # Use the OIDC Client ID and Audience instead of OAuth secrets
          oauth-client-id: ${{ secrets.TS_OIDC_CLIENT_ID }}
          audience: ${{ secrets.TS_OIDC_AUDIENCE }}
          tags: tag:ci 
          version: latest 

      # 2. Trigger the Coolify deployment via internal Tailnet route
      - name: Trigger Coolify Webhook
        run: |
          echo "Triggering Coolify deployment..."
          curl -k -s -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
               -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
          echo -e "\nDeployment triggered successfully!"