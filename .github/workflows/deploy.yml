name: Deploy to Coolify over Tailscale

on:
  push:
    branches:
      - master # Change this if your default branch is different (e.g., 'master')

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Connect the GitHub runner to your Tailscale network
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci # This is mandatory when using OAuth
          version: latest # Or specify a version

      # 2. Trigger the Coolify deployment via internal Tailnet route
      - name: Trigger Coolify Webhook
        run: |
          echo "Triggering Coolify deployment..."
          # The -k flag ignores SSL warnings if your internal URL uses self-signed HTTPs
          # The -s flag makes it silent, hiding the progress bar
          curl -k -s -X GET "${{ secrets.Ck3aujXtRb2t5oNfJPMS2Pn4QBeKdHjUQ2R4aRW3 }}"
          echo -e "\nDeployment triggered successfully!"