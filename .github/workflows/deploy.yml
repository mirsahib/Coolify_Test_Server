name: Deploy to Coolify over Tailscale

on:
  push:
    branches:
      - master 

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Connect the GitHub runner to your Tailscale network (Upgraded to v4)
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:CI 
          version: latest 

      # 2. Trigger the Coolify deployment via internal Tailnet route
      - name: Trigger Coolify Webhook
        run: |
          echo "Triggering Coolify deployment..."
          # Replaced the hardcoded value with the correct Secret Name
          curl -k -s -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}"
          echo -e "\nDeployment triggered successfully!"